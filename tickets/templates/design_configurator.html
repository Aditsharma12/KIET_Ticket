<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Your Tickets | KIET Ticket System</title>
    
        <style>
        /* ===== OCEAN BLUE GLOBAL THEME (PORTED) ===== */
        /* Preserves original layout & JS – only styling changed */
        /* ✓ Boxes parallel (equal height)   */
        /* ✓ Text size increased              */
        /* ✓ Ticket preview – medium size (550×250) */

        /* ---------- ORIGINAL STRUCTURAL VARIABLES (KEPT) ---------- */

          html {
    background: #030812;  /* darkest color only */
}

body {
    position: relative;
    z-index: 0;
}
.container {
    position: relative;
    z-index: 10;
}

        :root {
            --primary-glow: #40e0ff;
            --bg-dark: #030812;
            --card-glass: rgba(4, 16, 30, 0.75);
            --text-main: #f8fafc;
            --text-dim: #b0e0ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ---------- FULL OCEAN GRADIENT BACKGROUND (GLOBAL) ---------- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #030812, #07111f, #0a1a2a, #041220) !important;
            background-size: 400% 400% !important;
            animation: oceanDrift 25s ease infinite !important;
            color: white;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            font-size: 16px; /* base font increased */
        }

        @keyframes oceanDrift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* ---------- DARK OVERLAY (GLOBAL) – PSEUDO-ELEMENT SIMULATION ---------- */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 10, 20, 0.15);
            z-index: 0;
            pointer-events: none;
        }

        /* ---------- BUBBLES – EXACT GLOBAL BEHAVIOR (OVERRIDE INLINE STYLES) ---------- */
        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            backdrop-filter: blur(3px);
            animation: float 20s infinite ease-in-out !important;
            border: 1px solid rgba(64, 224, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            cursor: pointer;
            background: radial-gradient(circle at 30% 30%, rgba(64, 224, 255, 0.4), rgba(0, 105, 148, 0.3)) !important;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.2) !important;
            pointer-events: auto;
        }

        .bubble:hover {
            transform: scale(1.5) translateY(-20px) !important;
            border: 2px solid rgba(255, 255, 255, 0.8) !important;
            box-shadow: 0 0 40px rgba(64, 224, 255, 0.8), 0 0 80px rgba(0, 150, 255, 0.6) !important;
            backdrop-filter: blur(5px);
            z-index: 100;
            animation-play-state: paused !important;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0) scale(0.7); opacity: 0.5; }
            25% { transform: translateY(70vh) translateX(40px) scale(1.2); opacity: 0.8; }
            50% { transform: translateY(40vh) translateX(-30px) scale(1.4); opacity: 1; }
            75% { transform: translateY(20vh) translateX(30px) scale(1.2); opacity: 0.7; }
            100% { transform: translateY(-20vh) translateX(0) scale(0.7); opacity: 0.4; }
        }

        /* ----- BUBBLE VARIETY – MATCHING GLOBAL CLASSES (NTH-CHILD) ----- */
        .bubble:nth-child(1)  { width: 180px !important; height: 180px !important; top: 10% !important; left: 5% !important; animation-duration: 22s !important; background: radial-gradient(circle at 30% 30%, rgba(0,191,255,0.4), rgba(0,105,148,0.3)) !important; }
        .bubble:nth-child(2)  { width: 120px !important; height: 120px !important; top: 40% !important; right: 15% !important; animation-duration: 25s !important; background: radial-gradient(circle at 30% 30%, rgba(70,130,180,0.45), rgba(25,85,125,0.35)) !important; }
        .bubble:nth-child(3)  { width: 90px !important; height: 90px !important; bottom: 30% !important; left: 20% !important; animation-duration: 19s !important; background: radial-gradient(circle at 30% 30%, rgba(30,144,255,0.5), rgba(0,90,156,0.4)) !important; }
        .bubble:nth-child(4)  { width: 200px !important; height: 200px !important; top: 20% !important; right: 25% !important; animation-duration: 24s !important; background: radial-gradient(circle at 30% 30%, rgba(64,224,208,0.45), rgba(0,139,139,0.35)) !important; }
        .bubble:nth-child(5)  { width: 140px !important; height: 140px !important; bottom: 20% !important; right: 35% !important; animation-duration: 21s !important; background: radial-gradient(circle at 30% 30%, rgba(72,209,204,0.5), rgba(32,178,170,0.4)) !important; }
        .bubble:nth-child(6)  { width: 70px !important; height: 70px !important; top: 70% !important; left: 35% !important; animation-duration: 17s !important; background: radial-gradient(circle at 30% 30%, rgba(0,206,209,0.55), rgba(0,139,139,0.45)) !important; }
        .bubble:nth-child(7)  { width: 160px !important; height: 160px !important; top: 50% !important; left: 45% !important; animation-duration: 23s !important; background: radial-gradient(circle at 30% 30%, rgba(137,207,240,0.5), rgba(100,149,237,0.4)) !important; }
        .bubble:nth-child(8)  { width: 100px !important; height: 100px !important; bottom: 15% !important; left: 65% !important; animation-duration: 20s !important; background: radial-gradient(circle at 30% 30%, rgba(173,216,230,0.55), rgba(135,206,235,0.45)) !important; }
        .bubble:nth-child(9)  { width: 85px !important; height: 85px !important; top: 80% !important; right: 45% !important; animation-duration: 18s !important; background: radial-gradient(circle at 30% 30%, rgba(135,206,250,0.6), rgba(70,130,200,0.5)) !important; }
        .bubble:nth-child(10) { width: 150px !important; height: 150px !important; top: 15% !important; left: 75% !important; animation-duration: 26s !important; background: radial-gradient(circle at 30% 30%, rgba(64,224,208,0.45), rgba(0,128,128,0.35)) !important; }
        .bubble:nth-child(11) { width: 95px !important; height: 95px !important; bottom: 40% !important; right: 55% !important; animation-duration: 22s !important; background: radial-gradient(circle at 30% 30%, rgba(32,178,170,0.5), rgba(0,128,128,0.4)) !important; }
        .bubble:nth-child(12) { width: 220px !important; height: 220px !important; bottom: 10% !important; left: 10% !important; animation-duration: 28s !important; background: radial-gradient(circle at 30% 30%, rgba(0,0,128,0.35), rgba(25,25,112,0.3)) !important; }

        /* ---------- CONTAINER – GLOBAL STACKING ---------- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* ---------- BACK LINK – STYLED LIKE GLOBAL .btn / .username ---------- */
        .back-link {
            color: #b0e0ff;
            font-weight: 600;
            background: rgba(0, 100, 200, 0.2);
            padding: 10px 25px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(64, 224, 255, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 25px;
            font-size: 1.2rem; /* increased */
        }

        .back-link:hover {
            background: rgba(0, 150, 255, 0.3);
            border-color: rgba(64, 224, 255, 0.8);
            box-shadow: 0 0 20px rgba(64, 224, 255, 0.5);
            transform: scale(1.05);
            color: white;
        }

        /* ---------- PAGE TITLE – OCEAN GLOW (LIKE WELCOME-SECTION H1) ---------- */
        h1 {
            text-align: center;
            color: white;
            font-size: 3rem; /* increased */
            margin-bottom: 40px;
            text-shadow: 0 0 25px rgba(64, 224, 255, 0.8);
            transition: all 0.3s ease;
        }

        h1:hover {
            text-shadow: 0 0 35px rgba(64, 224, 255, 0.9);
            letter-spacing: 2px;
        }

        /* ---------- LAYOUT – MAKE BOTH COLUMNS EQUAL HEIGHT (PARALLEL) ---------- */
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: stretch; /* forces both columns to stretch to same height */
        }

        /* ---------- GLASS CARDS – EXACT GLOBAL .stat-card STYLE ---------- */
        .form-section, .preview-section {
            background: rgba(4, 16, 30, 0.7) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            padding: 30px;
            border-radius: 25px !important;
            border: 1px solid rgba(64, 224, 255, 0.25) !important;
            box-shadow: 0 10px 30px rgba(0, 50, 100, 0.2) !important;
            transition: all 0.3s ease !important;
            height: 100%; /* ensures full height of grid cell */
            display: flex;
            flex-direction: column;
        }

        .form-section:hover, .preview-section:hover {
            background: rgba(8, 24, 44, 0.85) !important;
            border: 1px solid rgba(64, 224, 255, 0.7) !important;
            box-shadow: 0 15px 45px rgba(0, 150, 255, 0.4) !important;
            transform: translateY(-8px) scale(1.02) !important;
        }

        /* ---------- PREVIEW SECTION – FLEX CENTERING (PERFECT ALIGNMENT) ---------- */
        .preview-section {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .preview-section h3 {
            color: var(--text-dim);
            margin-bottom: 20px;
            margin-top: 0 !important;
            align-self: flex-start;
            font-size: 1.5rem; /* increased */
        }

        /* ---------- FORM ELEMENTS – DEEP OCEAN THEME, BIGGER TEXT ---------- */
        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #b0e0ff !important;
            font-size: 1.1rem; /* increased */
        }

        input[type="text"], 
        input[type="number"], 
        select,
        input[type="color"] {
            width: 100%;
            padding: 14px; /* slightly larger */
            border-radius: 12px;
            border: 1px solid rgba(64, 224, 255, 0.2);
            background: rgba(2, 10, 20, 0.8) !important;
            color: white !important;
            font-size: 1.1rem; /* increased */
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #40e0ff !important;
            box-shadow: 0 0 15px rgba(64, 224, 255, 0.5) !important;
        }

        input[type="color"] {
            height: 60px; /* bigger */
            cursor: pointer;
        }

        .radio-group { 
            display: flex; 
            gap: 30px; 
            margin-top: 10px; 
        }

        .radio-option { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .radio-option input[type="radio"] {
            accent-color: #40e0ff;
            width: 20px;
            height: 20px;
        }

        .radio-option label {
            font-size: 1.1rem;
            margin: 0;
        }

        .price-field { display: none; }
        .price-field.active { display: block; }

        /* ---------- BUTTON – EXACT GLOBAL .btn STYLE, BIGGER TEXT ---------- */
        button {
            width: 100%;
            background: linear-gradient(135deg, #0a4a6a, #062a3a) !important;
            color: white !important;
            border: 1px solid rgba(64, 224, 255, 0.4) !important;
            padding: 18px !important;
            border-radius: 30px !important;
            cursor: pointer;
            font-size: 1.2rem !important; /* increased */
            font-weight: 700 !important;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease !important;
            box-shadow: 0 5px 20px rgba(0, 100, 255, 0.3) !important;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05) !important;
            background: linear-gradient(135deg, #0e5a7a, #0a3a4a) !important;
            border-color: rgba(64, 224, 255, 0.8) !important;
            box-shadow: 0 10px 35px rgba(64, 224, 255, 0.6) !important;
            letter-spacing: 2px;
        }

        /* ========== TICKET PREVIEW – MEDIUM SIZE (550×250) ========== */
        .ticket-preview {
            width: 550px !important;
            height: 250px !important;
            background: white;
            border-radius: 15px !important;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7) !important;
            border: 1px solid rgba(64, 224, 255, 0.2);
            transition: all 0.3s ease;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
        }

        .ticket-preview:hover {
            border-color: rgba(64, 224, 255, 0.6);
            box-shadow: 0 30px 70px rgba(0, 150, 255, 0.5) !important;
            transform: scale(1.01);
        }

        .ticket-left {
            flex: 1;
            padding: 25px 30px !important; /* adjusted for medium size */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .ticket-header {
            font-weight: bold !important;
            font-size: 1.8rem !important; /* adjusted */
        }

        .ticket-type {
            font-size: 1.1rem !important;
            margin-top: 15px !important;
            font-weight: 600;
            opacity: 0.9;
        }

        .ticket-bottom {
            font-size: 0.85rem !important;
        }

        .ticket-bottom div:last-child {
            font-size: 0.75rem !important;
            margin-top: 5px;
        }

        .ticket-right {
            width: 150px !important; /* narrower for medium size */
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: flex-end !important;
            padding: 15px !important;
            padding-bottom: 25px !important;
            background: rgba(0, 0, 0, 0.15) !important;
            border-left: 2px dashed rgba(255, 255, 255, 0.2) !important;
        }

        .qr-placeholder {
            width: 100px !important;
            height: 100px !important;
            background: rgba(255, 255, 255, 0.9) !important;
            border: 2px solid #333 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #0a1a2a !important;
            border-radius: 10px !important;
            margin-top: 10px !important;
            font-weight: bold;
            backdrop-filter: blur(2px);
        }

        .ticket-right > div:first-child {
            color: white;
            font-size: 0.7rem;
            margin-bottom: 5px;
        }

        /* ---------- CUSTOM SCROLLBAR – OCEAN BLUE (GLOBAL) ---------- */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a1a2a;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-track:hover {
            background: #0a2a3a;
        }

        ::-webkit-scrollbar-thumb {
            background: #0a6a8a;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0a8aaa;
            box-shadow: 0 0 20px #40e0ff;
        }

        /* ---------- RESPONSIVE (ORIGINAL) ---------- */
        @media (max-width: 900px) {
            .layout { 
                grid-template-columns: 1fr; 
            }
            .ticket-preview {
                width: 100% !important;
                max-width: 550px;
                height: auto !important;
                flex-direction: column !important;
            }
            .ticket-right {
                width: 100% !important;
                border-left: none !important;
                border-top: 2px dashed rgba(255,255,255,0.2);
                justify-content: center;
                padding: 15px !important;
            }
        }
</style>
        
</head>

<body>
    <div class="bubbles">
        <div class="bubble" style="width: 200px; height: 200px; left: 5%; animation-duration: 18s; animation-delay: 0s;"></div>
        <div class="bubble" style="width: 120px; height: 120px; left: 15%; animation-duration: 25s; animation-delay: 2s;"></div>
        <div class="bubble" style="width: 280px; height: 280px; left: 30%; animation-duration: 22s; animation-delay: 5s;"></div>
        <div class="bubble" style="width: 100px; height: 100px; left: 45%; animation-duration: 20s; animation-delay: 1s;"></div>
        <div class="bubble" style="width: 250px; height: 250px; left: 60%; animation-duration: 28s; animation-delay: 4s;"></div>
        <div class="bubble" style="width: 150px; height: 150px; left: 75%; animation-duration: 24s; animation-delay: 0s;"></div>
        <div class="bubble" style="width: 180px; height: 180px; left: 85%; animation-duration: 21s; animation-delay: 7s;"></div>
        <div class="bubble" style="width: 110px; height: 110px; left: 25%; animation-duration: 19s; animation-delay: 3s;"></div>
        <div class="bubble" style="width: 220px; height: 220px; left: 55%; animation-duration: 26s; animation-delay: 8s;"></div>
        <div class="bubble" style="width: 130px; height: 130px; left: 95%; animation-duration: 23s; animation-delay: 6s;"></div>
        <div class="bubble" style="width: 160px; height: 160px; left: 40%; animation-duration: 27s; animation-delay: 2s;"></div>
        <div class="bubble" style="width: 240px; height: 240px; left: 70%; animation-duration: 20s; animation-delay: 10s;"></div>
    </div>

    <div class="container">
        <a href="/" class="back-link">← Back to Dashboard</a>

        <h1>🎨 Design Your Tickets</h1>

        <div class="layout">
            <div class="form-section">
                <form method="POST" action="/save-design/" id="designForm">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Event Name</label>
                        <input type="text" name="event_name" id="eventName"
                            value="{{ design.event_name|default:'My Event' }}" placeholder="Tech Fest 2026" required>
                    </div>

                    <div class="form-group">
                        <label>Ticket Type</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" name="ticket_type" value="entry" id="typeEntry" 
                                    {% if design.ticket_type == 'entry' or not design %}checked{% endif %}>
                                <label for="typeEntry" style="margin: 0;">Free Entry</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="ticket_type" value="paid" id="typePaid" 
                                    {% if design.ticket_type == 'paid' %}checked{% endif %}>
                                <label for="typePaid" style="margin: 0;">Paid</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group price-field" id="priceField">
                        <label>Price (₹)</label>
                        <input type="number" name="price" id="price" value="{{ design.price|default:'500' }}" min="0"
                            placeholder="500">
                    </div>

                    <div class="form-group">
                        <label>Primary Color</label>
                        <input type="color" name="primary_color" id="primaryColor"
                            value="{{ design.primary_color|default:'#2563eb' }}">
                    </div>

                    <div class="form-group">
                        <label>Secondary Color</label>
                        <input type="color" name="secondary_color" id="secondaryColor"
                            value="{{ design.secondary_color|default:'#1e40af' }}">
                    </div>

                    <div class="form-group">
                        <label>Background Style</label>
                        <select name="background_style" id="backgroundStyle">
                            <option value="gradient" {% if design.background_style == 'gradient' or not design %}selected{% endif %}>Gradient</option>
                            <option value="solid" {% if design.background_style == 'solid' %}selected{% endif %}>Solid</option>
                        </select>
                    </div>

                    <button type="submit">💾 Save Design & Continue</button>
                </form>
            </div>

            <div class="preview-section">
                <h3 style="margin-bottom: 20px; color: var(--text-dim);">Live Preview</h3>
                <div class="ticket-preview" id="ticketPreview">
                    <div class="ticket-left">
                        <div>
                            <div class="ticket-header" id="previewEventName">MY EVENT</div>
                            <div class="ticket-type" id="previewType">FREE ENTRY</div>
                        </div>
                        <div class="ticket-bottom">
                            <div>TICKET ID: XXXXXXXX</div>
                            <div style="font-size: 0.7rem; margin-top: 5px; opacity: 0.7;">ADMIT ONE</div>
                        </div>
                    </div>
                    <div class="ticket-right">
                        <div class="qr-placeholder">QR CODE</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const typeEntry = document.getElementById('typeEntry');
        const typePaid = document.getElementById('typePaid');
        const priceField = document.getElementById('priceField');
        const eventName = document.getElementById('eventName');
        const primaryColor = document.getElementById('primaryColor');
        const secondaryColor = document.getElementById('secondaryColor');
        const backgroundStyle = document.getElementById('backgroundStyle');
        const price = document.getElementById('price');

        const ticketPreview = document.getElementById('ticketPreview');
        const previewEventName = document.getElementById('previewEventName');
        const previewType = document.getElementById('previewType');

        function updatePreview() {
            previewEventName.textContent = (eventName.value || 'MY EVENT').toUpperCase();

            if (typePaid.checked) {
                priceField.classList.add('active');
                previewType.textContent = `PAID ENTRY | ₹${price.value || '500'}`;
            } else {
                priceField.classList.remove('active');
                previewType.textContent = 'FREE ENTRY';
            }

            const primary = primaryColor.value;
            const secondary = secondaryColor.value;

            if (backgroundStyle.value === 'gradient') {
                ticketPreview.style.background = `linear-gradient(90deg, ${primary}, ${secondary})`;
            } else {
                ticketPreview.style.background = primary;
            }
        }

        eventName.addEventListener('input', updatePreview);
        typeEntry.addEventListener('change', updatePreview);
        typePaid.addEventListener('change', updatePreview);
        price.addEventListener('input', updatePreview);
        primaryColor.addEventListener('input', updatePreview);
        secondaryColor.addEventListener('input', updatePreview);
        backgroundStyle.addEventListener('change', updatePreview);

        updatePreview();
    </script>
</body>

</html>
