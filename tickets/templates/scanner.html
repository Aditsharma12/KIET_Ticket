<!DOCTYPE html>
<html>
{% load static %}

<head>
    <title>Gate Scanner · KIET Ticket System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* ========== DARK OCEAN THEME – BUBBLES GUARANTEED VISIBLE ========== */
        html {
            background: #030812;
        }

        body {
            position: relative;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 10;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
            background: linear-gradient(145deg, #030812, #07111f, #0a1a2a, #041220);
            background-size: 400% 400%;
            animation: oceanDrift 25s ease infinite;
            overflow-x: hidden;
        }

        @keyframes oceanDrift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* ===== EXPLICIT BUBBLE LAYER – HIGH OPACITY, BRIGHT COLORS ===== */
        .bubble-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .bubble-layer div {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(100, 224, 255, 0.6), rgba(0, 150, 255, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(64, 224, 255, 0.5);
            animation: floatBubble 18s infinite ease-in-out;
        }

        @keyframes floatBubble {
            0% { transform: translateY(100vh) translateX(0) scale(0.8); opacity: 0.7; }
            50% { transform: translateY(40vh) translateX(30px) scale(1.2); opacity: 0.9; }
            100% { transform: translateY(-20vh) translateX(-20px) scale(0.9); opacity: 0.5; }
        }

        /* ----- 30+ BUBBLES – EACH WITH UNIQUE SIZE, POSITION, DELAY ----- */
        .bubble1  { width: 140px; height: 140px; left: 5%; top: 10%; animation-delay: 0s; animation-duration: 20s; }
        .bubble2  { width: 90px; height: 90px; left: 15%; top: 40%; animation-delay: 2s; animation-duration: 17s; }
        .bubble3  { width: 180px; height: 180px; left: 25%; top: 70%; animation-delay: 4s; animation-duration: 22s; }
        .bubble4  { width: 70px; height: 70px; left: 40%; top: 20%; animation-delay: 1s; animation-duration: 15s; }
        .bubble5  { width: 120px; height: 120px; left: 50%; top: 80%; animation-delay: 3s; animation-duration: 19s; }
        .bubble6  { width: 200px; height: 200px; left: 70%; top: 30%; animation-delay: 5s; animation-duration: 24s; }
        .bubble7  { width: 80px; height: 80px; left: 85%; top: 60%; animation-delay: 2.5s; animation-duration: 16s; }
        .bubble8  { width: 150px; height: 150px; left: 10%; top: 85%; animation-delay: 6s; animation-duration: 21s; }
        .bubble9  { width: 60px; height: 60px; left: 30%; top: 50%; animation-delay: 0.5s; animation-duration: 14s; }
        .bubble10 { width: 110px; height: 110px; left: 60%; top: 15%; animation-delay: 3.8s; animation-duration: 18s; }
        .bubble11 { width: 170px; height: 170px; left: 80%; top: 75%; animation-delay: 7s; animation-duration: 23s; }
        .bubble12 { width: 95px; height: 95px; left: 45%; top: 45%; animation-delay: 1.2s; animation-duration: 17s; }
        .bubble13 { width: 130px; height: 130px; left: 20%; top: 25%; animation-delay: 4.5s; animation-duration: 20s; }
        .bubble14 { width: 75px; height: 75px; left: 75%; top: 50%; animation-delay: 2.2s; animation-duration: 16s; }
        .bubble15 { width: 190px; height: 190px; left: 55%; top: 65%; animation-delay: 6.5s; animation-duration: 25s; }
        .bubble16 { width: 50px; height: 50px; left: 8%; top: 95%; animation-delay: 0.8s; animation-duration: 13s; background: radial-gradient(circle at 30% 30%, rgba(180, 230, 255, 0.7), rgba(100, 200, 255, 0.3)); }
        .bubble17 { width: 65px; height: 65px; left: 92%; top: 18%; animation-delay: 5.2s; animation-duration: 15s; background: radial-gradient(circle at 30% 30%, rgba(200, 240, 255, 0.8), rgba(70, 180, 255, 0.3)); }
        .bubble18 { width: 85px; height: 85px; left: 38%; top: 92%; animation-delay: 3.3s; animation-duration: 18s; background: radial-gradient(circle at 30% 30%, rgba(150, 220, 255, 0.7), rgba(50, 160, 240, 0.3)); }
        .bubble19 { width: 105px; height: 105px; left: 68%; top: 8%; animation-delay: 7.5s; animation-duration: 19s; background: radial-gradient(circle at 30% 30%, rgba(120, 210, 255, 0.6), rgba(40, 140, 230, 0.3)); }
        .bubble20 { width: 55px; height: 55px; left: 48%; top: 35%; animation-delay: 0.2s; animation-duration: 14s; background: radial-gradient(circle at 30% 30%, rgba(210, 250, 255, 0.8), rgba(90, 200, 255, 0.4)); }

        /* ----- OVERLAY – keeps text readable ----- */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 10, 20, 0.2);
            pointer-events: none;
            z-index: 1;
        }

        /* ===== MAIN CONTENT – ABOVE EVERYTHING ===== */
        h1, #reader, #result, [name=csrfmiddlewaretoken] {
            position: relative;
            z-index: 3;
        }

        h1 {
            color: white;
            font-size: 2.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 25px rgba(64, 224, 255, 0.6);
            letter-spacing: 2px;
            font-weight: 700;
            text-align: center;
        }

        #reader {
            width: 100%;
            max-width: 550px;
            margin: 0 auto 20px;
            border-radius: 32px;
            overflow: hidden;
            background: rgba(4, 16, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(64, 224, 255, 0.4);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            padding: 5px;
        }

        #reader:hover {
            border-color: rgba(64, 224, 255, 0.9);
            box-shadow: 0 25px 50px rgba(0, 150, 255, 0.5);
        }

        /* Style internal scanner elements */
        #reader__dashboard_section {
            background: transparent !important;
            color: white !important;
        }

        #reader__dashboard_section_sw_link {
            color: white !important;
            background: rgba(4, 16, 30, 0.8) !important;
            padding: 8px 20px !important;
            border-radius: 40px !important;
            border: 1px solid rgba(64, 224, 255, 0.5) !important;
            transition: all 0.3s !important;
        }

        #reader__dashboard_section_sw_link:hover {
            background: rgba(8, 28, 48, 1) !important;
            border-color: rgba(64, 224, 255, 0.9) !important;
        }

        #reader__camera_selection {
            background: rgba(4, 16, 30, 0.9) !important;
            color: white !important;
            border: 1px solid rgba(64, 224, 255, 0.5) !important;
            border-radius: 40px !important;
            padding: 8px 15px !important;
        }

        #result {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 25px 30px;
            border-radius: 60px;
            background: rgba(4, 16, 30, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(64, 224, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 650px;
            width: 100%;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            color: white;
            letter-spacing: 0.5px;
        }

        .success {
            background: rgba(16, 80, 60, 0.9) !important;
            border-left: 8px solid #40e0ff !important;
        }

        .error {
            background: rgba(80, 20, 30, 0.9) !important;
            border-left: 8px solid #ff6b6b !important;
        }

        .waiting {
            background: rgba(4, 16, 30, 0.9) !important;
            border-left: 8px solid rgba(64, 224, 255, 0.6) !important;
            color: rgba(220, 245, 255, 1) !important;
        }

        [name=csrfmiddlewaretoken] {
            display: none;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a1a2a; }
        ::-webkit-scrollbar-thumb { background: #0a6a8a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0a8aaa; box-shadow: 0 0 20px #40e0ff; }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            #result { font-size: 1.3rem; padding: 18px; }
        }

        /* ===== BULLETPROOF BUTTON STYLES – ALL THREE 100% IDENTICAL ===== */
        button#html5-qrcode-button-camera-start,
        button#html5-qrcode-button-camera-stop,
        button#html5-qrcode-button-file-selection,
        #html5-qrcode-button-camera-start,
        #html5-qrcode-button-camera-stop,
        #html5-qrcode-button-file-selection {
            background: linear-gradient(135deg, #0a4a6a, #062a3a) !important;
            background-color: #0a4a6a !important;
            background-image: linear-gradient(135deg, #0a4a6a, #062a3a) !important;
            color: white !important;
            border: 1px solid rgba(64, 224, 255, 0.4) !important;
            border-radius: 30px !important;
            padding: 10px 25px !important;
            font-size: 14px !important;
            font-weight: 600 !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            box-shadow: 0 5px 15px rgba(0, 50, 100, 0.3) !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            margin: 5px !important;
            outline: none !important;
            appearance: none !important;
            -webkit-appearance: none !important;
            text-shadow: none !important;
            line-height: normal !important;
            vertical-align: middle !important;
        }

        button#html5-qrcode-button-camera-start:hover,
        button#html5-qrcode-button-camera-stop:hover,
        button#html5-qrcode-button-file-selection:hover,
        #html5-qrcode-button-camera-start:hover,
        #html5-qrcode-button-camera-stop:hover,
        #html5-qrcode-button-file-selection:hover {
            transform: translateY(-3px) scale(1.05) !important;
            background: linear-gradient(135deg, #0e5a7a, #0a3a4a) !important;
            background-color: #0e5a7a !important;
            background-image: linear-gradient(135deg, #0e5a7a, #0a3a4a) !important;
            border-color: rgba(64, 224, 255, 0.8) !important;
            box-shadow: 0 10px 30px rgba(0, 150, 255, 0.5) !important;
            letter-spacing: 2px !important;
        }
        
    </style>
</head>

<body>
    <!-- ===== VISIBLE BUBBLE LAYER – 20+ FLOATING ORBS ===== -->
    <div class="bubble-layer">
        <div class="bubble1"></div>
        <div class="bubble2"></div>
        <div class="bubble3"></div>
        <div class="bubble4"></div>
        <div class="bubble5"></div>
        <div class="bubble6"></div>
        <div class="bubble7"></div>
        <div class="bubble8"></div>
        <div class="bubble9"></div>
        <div class="bubble10"></div>
        <div class="bubble11"></div>
        <div class="bubble12"></div>
        <div class="bubble13"></div>
        <div class="bubble14"></div>
        <div class="bubble15"></div>
        <div class="bubble16"></div>
        <div class="bubble17"></div>
        <div class="bubble18"></div>
        <div class="bubble19"></div>
        <div class="bubble20"></div>
    </div>
    <div class="dark-overlay"></div>

    <!-- ===== ORIGINAL HTML – 100% UNCHANGED ===== -->
    <h1>GATE ENTRY SCANNER</h1>

    <div id="reader"></div>
    <div id="result" class="waiting">Waiting for scan...</div>

    {% csrf_token %}

    <!-- QR Scanner script – exactly as you wrote it -->
    <script>
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        let isScanning = true;

        function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;
            isScanning = false;

            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "Verifying...";
            resultDiv.className = "waiting";

            const formData = new FormData();
            formData.append('code', decodedText);

            fetch('/api/validate/', {
                method: 'POST',
                headers: { 'X-CSRFToken': csrfToken },
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    resultDiv.innerText = data.message;

                    if (data.status === 'success') {
                        resultDiv.className = "success";
                    } else {
                        resultDiv.className = "error";
                        if (data.time) {
                            resultDiv.innerText += "\n(Scanned at: " + data.time + ")";
                        }
                    }

                    setTimeout(() => {
                        isScanning = true;
                        resultDiv.innerText = "Ready to scan next...";
                        resultDiv.className = "waiting";
                    }, 3000);
                })
                .catch(err => {
                    console.error(err);
                    isScanning = true;
                });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>

</html>
